name: Build notebooks

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          lfs: true

      - name: Materialize LFS files
        run: |
          git lfs install
          git lfs pull
          git lfs checkout

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install OS packages for PDF export
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended texlive-plain-generic

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt nbconvert jupyter

      - name: Run export script
        run: python scripts/export_notebooks.py

      - name: Show created files
        run: |
          ls -lah
          test -f Part_I_exploration.html
          test -f Part_I_exploration.pdf
          test -f Part_II_explanatory.html
          test -f Part_II_explanatory.pdf

      - name: Upload reports as artifact
        uses: actions/upload-artifact@v4
        with:
          name: notebook-exports
          overwrite: true
          if-no-files-found: error
          path: |
            Part_I_exploration.html
            Part_I_exploration.pdf
            Part_II_explanatory.html
            Part_II_explanatory.pdf

      - name: Commit generated reports
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Auto-create HTML and PDF reports [skip ci]"
          file_pattern: |
            Part_I_exploration.html
            Part_I_exploration.pdf
            Part_II_explanatory.html
            Part_II_explanatory.pdf
            notebooks/*.ipynb
            figures/*.png