name: Build notebooks

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-and-export:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Materialize LFS files
        run: |
          git lfs install
          git lfs pull
          git lfs checkout

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages for PDF export
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended texlive-plain-generic

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate project structure and data
        run: python scripts/validate_project.py

      - name: Execute notebooks and generate HTML/PDF exports
        run: python scripts/export_notebooks.py

      - name: Upload generated reports
        uses: actions/upload-artifact@v4
        with:
          name: notebook-exports
          path: |
            Part_I_exploration.html
            Part_II_explanatory.html
            Part_I_exploration.pdf
            Part_II_explanatory.pdf
            figures/
          if-no-files-found: error

      - name: Commit refreshed exports back to the branch
        if: github.event_name == 'push'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-refresh notebook exports [skip ci]"
          file_pattern: |
            notebooks/*.ipynb
            figures/*.png
            Part_I_exploration.html
            Part_II_explanatory.html
            Part_I_exploration.pdf
            Part_II_explanatory.pdf