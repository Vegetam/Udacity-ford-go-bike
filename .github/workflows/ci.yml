name: Build notebooks

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Materialize LFS files
        run: |
          git lfs install
          git lfs pull
          git lfs checkout

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages for PDF export
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended texlive-plain-generic

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run export script
        run: python scripts/export_notebooks.py

      - name: Show created files
        run: |
          echo "=== Repo root ==="
          ls -lah Part_* 2>/dev/null || echo "No Part_* files found"
          echo "=== Figures ==="
          ls -lah figures/ 2>/dev/null || echo "No figures"
          echo "=== Notebooks ==="
          ls -lah notebooks/ 2>/dev/null || echo "No notebooks"

      - name: Upload generated reports
        uses: actions/upload-artifact@v4
        with:
          name: notebook-exports
          overwrite: true
          path: |
            Part_I_exploration.html
            Part_I_exploration.pdf
            Part_II_explanatory.html
            Part_II_explanatory.pdf
          if-no-files-found: warn

      - name: Commit and push generated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f Part_I_exploration.html Part_II_explanatory.html || true
          git add -f Part_I_exploration.pdf  Part_II_explanatory.pdf  || true
          git add -f notebooks/*.ipynb  || true
          git add -f figures/*.png      || true
          git status
          git diff --cached --stat
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-refresh notebook exports [skip ci]"
            git push
          fi